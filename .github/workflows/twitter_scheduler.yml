name: Twitter Auto Scheduler

on:
  schedule:
    # Times are UTC. JST = UTC+9
    - cron: '0  0  * * 5'   # 09:00 JST Friday  — generate weekly plan (7 days) → Teams
    - cron: '0  1  * * *'   # 10:00 JST daily    — post slot 10
    - cron: '0  10 * * *'   # 19:00 JST daily    — post slot 19
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  generate-weekly:
    name: Generate Weekly Plan (Fri 09:00 JST → Teams)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0  0  * * 5'
    env:
      ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
      TWITTER_API_KEY:               ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET:            ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_BEARER_TOKEN:          ${{ secrets.TWITTER_BEARER_TOKEN }}
      TWITTER_ACCESS_TOKEN:          ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET:   ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      TWITTER_CLIENT_ID:             ${{ secrets.TWITTER_CLIENT_ID }}
      TWITTER_CLIENT_SECRET:         ${{ secrets.TWITTER_CLIENT_SECRET }}
      TWITTER_ACTIONS_NOTION_DB_ID:  ${{ secrets.TWITTER_ACTIONS_NOTION_DB_ID }}
      NOTION_API_TOKEN:              ${{ secrets.NOTION_API_TOKEN }}
      TEAMS_WEBHOOK_URL:             ${{ secrets.TEAMS_WEBHOOK_URL }}
      TEAMS_MASTER_WEBHOOK_URL:      ${{ secrets.TEAMS_MASTER_WEBHOOK_URL }}
      TEAMS_MASTER_CHANNEL_ID:       ${{ secrets.TEAMS_MASTER_CHANNEL_ID }}
      TEAMS_TENANT_ID:               ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_GRAPH_CLIENT_ID:         ${{ secrets.TEAMS_GRAPH_CLIENT_ID }}
      TEAMS_GRAPH_CLIENT_SECRET:     ${{ secrets.TEAMS_GRAPH_CLIENT_SECRET }}
      TEAMS_TEAM_ID:                 ${{ secrets.TEAMS_TEAM_ID }}
      TEAMS_CHANNEL_ID:              ${{ secrets.TEAMS_CHANNEL_ID }}
      TEAMS_CONTENT_TEAM_ID:         ${{ secrets.TEAMS_CONTENT_TEAM_ID }}
      TEAMS_CONTENT_CHANNEL_ID:      ${{ secrets.TEAMS_CONTENT_CHANNEL_ID }}
      TEAMS_CONTENT_WEBHOOK_URL:     ${{ secrets.TEAMS_CONTENT_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python tools/twitter_scheduler.py --generate-weekly

  post-slot-10:
    name: Post Slot 10:00 JST
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0  1  * * *'
    env:
      ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
      TWITTER_API_KEY:               ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET:            ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_BEARER_TOKEN:          ${{ secrets.TWITTER_BEARER_TOKEN }}
      TWITTER_ACCESS_TOKEN:          ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET:   ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      TWITTER_CLIENT_ID:             ${{ secrets.TWITTER_CLIENT_ID }}
      TWITTER_CLIENT_SECRET:         ${{ secrets.TWITTER_CLIENT_SECRET }}
      TWITTER_ACTIONS_NOTION_DB_ID:  ${{ secrets.TWITTER_ACTIONS_NOTION_DB_ID }}
      NOTION_API_TOKEN:              ${{ secrets.NOTION_API_TOKEN }}
      TEAMS_WEBHOOK_URL:             ${{ secrets.TEAMS_WEBHOOK_URL }}
      TEAMS_MASTER_WEBHOOK_URL:      ${{ secrets.TEAMS_MASTER_WEBHOOK_URL }}
      TEAMS_MASTER_CHANNEL_ID:       ${{ secrets.TEAMS_MASTER_CHANNEL_ID }}
      TEAMS_TENANT_ID:               ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_GRAPH_CLIENT_ID:         ${{ secrets.TEAMS_GRAPH_CLIENT_ID }}
      TEAMS_GRAPH_CLIENT_SECRET:     ${{ secrets.TEAMS_GRAPH_CLIENT_SECRET }}
      TEAMS_TEAM_ID:                 ${{ secrets.TEAMS_TEAM_ID }}
      TEAMS_CHANNEL_ID:              ${{ secrets.TEAMS_CHANNEL_ID }}
      TEAMS_CONTENT_TEAM_ID:         ${{ secrets.TEAMS_CONTENT_TEAM_ID }}
      TEAMS_CONTENT_CHANNEL_ID:      ${{ secrets.TEAMS_CONTENT_CHANNEL_ID }}
      TEAMS_CONTENT_WEBHOOK_URL:     ${{ secrets.TEAMS_CONTENT_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python tools/twitter_scheduler.py --slot 10

  post-slot-19:
    name: Post Slot 19:00 JST
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0  10 * * *'
    env:
      ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
      TWITTER_API_KEY:               ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET:            ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_BEARER_TOKEN:          ${{ secrets.TWITTER_BEARER_TOKEN }}
      TWITTER_ACCESS_TOKEN:          ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET:   ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      TWITTER_CLIENT_ID:             ${{ secrets.TWITTER_CLIENT_ID }}
      TWITTER_CLIENT_SECRET:         ${{ secrets.TWITTER_CLIENT_SECRET }}
      TWITTER_ACTIONS_NOTION_DB_ID:  ${{ secrets.TWITTER_ACTIONS_NOTION_DB_ID }}
      NOTION_API_TOKEN:              ${{ secrets.NOTION_API_TOKEN }}
      TEAMS_WEBHOOK_URL:             ${{ secrets.TEAMS_WEBHOOK_URL }}
      TEAMS_MASTER_WEBHOOK_URL:      ${{ secrets.TEAMS_MASTER_WEBHOOK_URL }}
      TEAMS_MASTER_CHANNEL_ID:       ${{ secrets.TEAMS_MASTER_CHANNEL_ID }}
      TEAMS_TENANT_ID:               ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_GRAPH_CLIENT_ID:         ${{ secrets.TEAMS_GRAPH_CLIENT_ID }}
      TEAMS_GRAPH_CLIENT_SECRET:     ${{ secrets.TEAMS_GRAPH_CLIENT_SECRET }}
      TEAMS_TEAM_ID:                 ${{ secrets.TEAMS_TEAM_ID }}
      TEAMS_CHANNEL_ID:              ${{ secrets.TEAMS_CHANNEL_ID }}
      TEAMS_CONTENT_TEAM_ID:         ${{ secrets.TEAMS_CONTENT_TEAM_ID }}
      TEAMS_CONTENT_CHANNEL_ID:      ${{ secrets.TEAMS_CONTENT_CHANNEL_ID }}
      TEAMS_CONTENT_WEBHOOK_URL:     ${{ secrets.TEAMS_CONTENT_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python tools/twitter_scheduler.py --slot 19
