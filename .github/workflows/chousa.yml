name: 調査マン

on:
  schedule:
    - cron: '0 7 * * *'   # 毎日 16:00 JST — 競合・参考ブランドのTwitter運用を調査
  workflow_dispatch:

jobs:
  research:
    name: 調査マン — 競合ブランドTwitter運用週次調査
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
      FIRECRAWL_API_KEY:        ${{ secrets.FIRECRAWL_API_KEY }}
      TEAMS_WEBHOOK_URL:        ${{ secrets.TEAMS_WEBHOOK_URL }}
      TEAMS_MASTER_WEBHOOK_URL: ${{ secrets.TEAMS_MASTER_WEBHOOK_URL }}
      TEAMS_TENANT_ID:          ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_GRAPH_CLIENT_ID:    ${{ secrets.TEAMS_GRAPH_CLIENT_ID }}
      TEAMS_GRAPH_CLIENT_SECRET: ${{ secrets.TEAMS_GRAPH_CLIENT_SECRET }}
      TEAMS_TEAM_ID:            ${{ secrets.TEAMS_TEAM_ID }}
      TEAMS_CHANNEL_ID:         ${{ secrets.TEAMS_CHANNEL_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python tools/twitter_research.py
