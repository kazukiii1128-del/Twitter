name: ツイート

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  tweet-10:
    name: ツイート 10:00 JST
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 1 * * *'
    env:
      ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
      TWITTER_API_KEY:              ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET:           ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_BEARER_TOKEN:         ${{ secrets.TWITTER_BEARER_TOKEN }}
      TWITTER_ACCESS_TOKEN:         ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET:  ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      TWITTER_CLIENT_ID:            ${{ secrets.TWITTER_CLIENT_ID }}
      TWITTER_CLIENT_SECRET:        ${{ secrets.TWITTER_CLIENT_SECRET }}
      TEAMS_TENANT_ID:              ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_GRAPH_CLIENT_ID:        ${{ secrets.TEAMS_GRAPH_CLIENT_ID }}
      TEAMS_GRAPH_CLIENT_SECRET:    ${{ secrets.TEAMS_GRAPH_CLIENT_SECRET }}
      TEAMS_TEAM_ID:                ${{ secrets.TEAMS_TEAM_ID }}
      TEAMS_CHANNEL_ID:             ${{ secrets.TEAMS_CHANNEL_ID }}
      TEAMS_WEBHOOK_URL:            ${{ secrets.TEAMS_WEBHOOK_URL }}
      TEAMS_MASTER_WEBHOOK_URL:     ${{ secrets.TEAMS_MASTER_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run scheduler (slot 10)
        run: |
          set -o pipefail
          python tools/twitter_scheduler.py --slot 10 2>&1 | tee /tmp/tweet10.log
      - name: Teamsにエラーログ送信
        if: failure()
        run: |
          python3 - <<'EOF'
          import os, requests
          webhook = os.getenv("TEAMS_WEBHOOK_URL") or os.getenv("TEAMS_MASTER_WEBHOOK_URL")
          if not webhook:
              exit(0)
          with open("/tmp/tweet10.log", errors="replace") as f:
              log = f.read()[-3000:]
          requests.post(webhook, json={"text": f"❌ **ツイート10:00 失敗ログ**\n```\n{log}\n```"}, timeout=10)
          EOF

  tweet-19:
    name: ツイート 19:00 JST
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 10 * * *'
    env:
      ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
      TWITTER_API_KEY:              ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET:           ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_BEARER_TOKEN:         ${{ secrets.TWITTER_BEARER_TOKEN }}
      TWITTER_ACCESS_TOKEN:         ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET:  ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      TWITTER_CLIENT_ID:            ${{ secrets.TWITTER_CLIENT_ID }}
      TWITTER_CLIENT_SECRET:        ${{ secrets.TWITTER_CLIENT_SECRET }}
      TEAMS_TENANT_ID:              ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_GRAPH_CLIENT_ID:        ${{ secrets.TEAMS_GRAPH_CLIENT_ID }}
      TEAMS_GRAPH_CLIENT_SECRET:    ${{ secrets.TEAMS_GRAPH_CLIENT_SECRET }}
      TEAMS_TEAM_ID:                ${{ secrets.TEAMS_TEAM_ID }}
      TEAMS_CHANNEL_ID:             ${{ secrets.TEAMS_CHANNEL_ID }}
      TEAMS_WEBHOOK_URL:            ${{ secrets.TEAMS_WEBHOOK_URL }}
      TEAMS_MASTER_WEBHOOK_URL:     ${{ secrets.TEAMS_MASTER_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run scheduler (slot 19)
        run: |
          set -o pipefail
          python tools/twitter_scheduler.py --slot 19 2>&1 | tee /tmp/tweet19.log
      - name: Teamsにエラーログ送信
        if: failure()
        run: |
          python3 - <<'EOF'
          import os, requests
          webhook = os.getenv("TEAMS_WEBHOOK_URL") or os.getenv("TEAMS_MASTER_WEBHOOK_URL")
          if not webhook:
              exit(0)
          with open("/tmp/tweet19.log", errors="replace") as f:
              log = f.read()[-3000:]
          requests.post(webhook, json={"text": f"❌ **ツイート19:00 失敗ログ**\n```\n{log}\n```"}, timeout=10)
          EOF
