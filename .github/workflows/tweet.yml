name: ツイート

on:
  schedule:
    - cron: '0 1  * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  tweet-10:
    name: ツイート 10:00 JST
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 1  * * *'
    env:
      ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
      TWITTER_API_KEY:              ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET:           ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_BEARER_TOKEN:         ${{ secrets.TWITTER_BEARER_TOKEN }}
      TWITTER_ACCESS_TOKEN:         ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET:  ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      TWITTER_CLIENT_ID:            ${{ secrets.TWITTER_CLIENT_ID }}
      TWITTER_CLIENT_SECRET:        ${{ secrets.TWITTER_CLIENT_SECRET }}
      TEAMS_TENANT_ID:              ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_GRAPH_CLIENT_ID:        ${{ secrets.TEAMS_GRAPH_CLIENT_ID }}
      TEAMS_GRAPH_CLIENT_SECRET:    ${{ secrets.TEAMS_GRAPH_CLIENT_SECRET }}
      TEAMS_TEAM_ID:                ${{ secrets.TEAMS_TEAM_ID }}
      TEAMS_CHANNEL_ID:             ${{ secrets.TEAMS_CHANNEL_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python tools/twitter_scheduler.py --slot 10

  tweet-19:
    name: ツイート 19:00 JST
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 10 * * *'
    env:
      ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
      TWITTER_API_KEY:              ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET:           ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_BEARER_TOKEN:         ${{ secrets.TWITTER_BEARER_TOKEN }}
      TWITTER_ACCESS_TOKEN:         ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET:  ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      TWITTER_CLIENT_ID:            ${{ secrets.TWITTER_CLIENT_ID }}
      TWITTER_CLIENT_SECRET:        ${{ secrets.TWITTER_CLIENT_SECRET }}
      TEAMS_TENANT_ID:              ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_GRAPH_CLIENT_ID:        ${{ secrets.TEAMS_GRAPH_CLIENT_ID }}
      TEAMS_GRAPH_CLIENT_SECRET:    ${{ secrets.TEAMS_GRAPH_CLIENT_SECRET }}
      TEAMS_TEAM_ID:                ${{ secrets.TEAMS_TEAM_ID }}
      TEAMS_CHANNEL_ID:             ${{ secrets.TEAMS_CHANNEL_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python tools/twitter_scheduler.py --slot 19
