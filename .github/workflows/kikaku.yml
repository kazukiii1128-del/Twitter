name: 企画係

on:
  schedule:
    - cron: '0 0 * * 5'
  workflow_dispatch:

jobs:
  kikaku:
    name: 企画係 — 週間ツイートプラン生成 → Teams
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
      NOTION_API_TOKEN:             ${{ secrets.NOTION_API_TOKEN }}
      TEAMS_WEBHOOK_URL:            ${{ secrets.TEAMS_WEBHOOK_URL }}
      TEAMS_MASTER_WEBHOOK_URL:     ${{ secrets.TEAMS_MASTER_WEBHOOK_URL }}
      TEAMS_MASTER_CHANNEL_ID:      ${{ secrets.TEAMS_MASTER_CHANNEL_ID }}
      TEAMS_TENANT_ID:              ${{ secrets.TEAMS_TENANT_ID }}
      TEAMS_GRAPH_CLIENT_ID:        ${{ secrets.TEAMS_GRAPH_CLIENT_ID }}
      TEAMS_GRAPH_CLIENT_SECRET:    ${{ secrets.TEAMS_GRAPH_CLIENT_SECRET }}
      TEAMS_TEAM_ID:                ${{ secrets.TEAMS_TEAM_ID }}
      TEAMS_CHANNEL_ID:             ${{ secrets.TEAMS_CHANNEL_ID }}
      TEAMS_CONTENT_TEAM_ID:        ${{ secrets.TEAMS_CONTENT_TEAM_ID }}
      TEAMS_CONTENT_CHANNEL_ID:     ${{ secrets.TEAMS_CONTENT_CHANNEL_ID }}
      TEAMS_CONTENT_WEBHOOK_URL:    ${{ secrets.TEAMS_CONTENT_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python tools/twitter_scheduler.py --generate-weekly
